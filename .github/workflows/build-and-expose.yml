name: Build Docker image and expose with Ngrok

on:
  push:
  workflow_dispatch:

jobs:
  quality:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install development dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run Ruff lint
        run: ruff check .

      - name: Check Ruff formatting
        run: ruff format --check .

      - name: Run tests
        run: pytest

  docker-build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t atelier-devops-flask:${{ github.sha }} .

      - name: Export Docker image
        run: docker save atelier-devops-flask:${{ github.sha }} -o atelier-devops-flask.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: atelier-devops-flask-image
          path: atelier-devops-flask.tar
          retention-days: 1

  security:
    name: Scan image and secrets
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: atelier-devops-flask-image

      - name: Load Docker image
        run: docker load -i atelier-devops-flask.tar

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: atelier-devops-flask:${{ github.sha }}
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          scanners: vuln
          pkg-types: os,library

      - name: Scan repository secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  ngrok:
    name: Run and expose
    runs-on: ubuntu-latest
    needs: security
    timeout-minutes: 5

    steps:
      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: atelier-devops-flask-image

      - name: Load Docker image
        run: docker load -i atelier-devops-flask.tar

      - name: Run Flask container
        run: |
          docker run -d \
            --name atelier-devops-flask \
            -p 5000:5000 \
            atelier-devops-flask:${{ github.sha }}

      - name: Wait for Flask
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://localhost:5000/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          docker logs atelier-devops-flask
          exit 1

      - name: Start Ngrok tunnel
        run: |
          docker run -d \
            --name atelier-devops-ngrok \
            --network host \
            -e NGROK_AUTHTOKEN="${{ secrets.NGROK_AUTHTOKEN }}" \
            ngrok/ngrok:latest \
            http 5000

      - name: Print public Ngrok URL
        run: |
          for attempt in {1..30}; do
            public_url="$(curl -fsS http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url // empty')"

            if [ -n "$public_url" ]; then
              echo "Public Ngrok URL: $public_url"
              echo "Exercise page: ${public_url}/exercices/"
              exit 0
            fi

            sleep 1
          done

          docker logs atelier-devops-ngrok
          exit 1

      - name: Keep tunnel open for demo
        run: sleep 120

      - name: Cleanup containers
        if: always()
        run: |
          docker rm -f atelier-devops-ngrok atelier-devops-flask 2>/dev/null || true
