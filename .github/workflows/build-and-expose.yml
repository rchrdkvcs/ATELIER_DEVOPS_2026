name: Build Docker image and expose with Ngrok

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  DOCKER_METADATA_SHORT_SHA_LENGTH: 7

jobs:
  quality:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install development dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run Ruff lint
        run: ruff check .

      - name: Check Ruff formatting
        run: ruff format --check .

      - name: Run tests
        run: pytest

  security:
    name: Scan image and secrets
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Docker image
        run: docker build -t atelier-devops-flask:${{ github.sha }} .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: atelier-devops-flask:${{ github.sha }}
          severity: CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          scanners: vuln
          vuln-type: os,library

      - name: Scan repository secrets with Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-push:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: security
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare image name
        id: image
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=ref,event=pr,prefix=pr-

      - name: Log in to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.11.1

      - name: Build and push Docker image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  ngrok:
    name: Run and expose
    runs-on: ubuntu-latest
    needs: build-push
    timeout-minutes: 5
    permissions:
      contents: read
      packages: read

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull Docker image from GHCR
        run: |
          image_name="ghcr.io/${GITHUB_REPOSITORY,,}"
          image_tag="sha-${GITHUB_SHA::7}"
          docker pull "${image_name}:${image_tag}"
          echo "IMAGE_REF=${image_name}:${image_tag}" >> "$GITHUB_ENV"

      - name: Run Flask container
        run: |
          docker run -d \
            --name atelier-devops-flask \
            -p 5000:5000 \
            "$IMAGE_REF"

      - name: Wait for Flask
        run: |
          for attempt in {1..30}; do
            if curl -fsS http://localhost:5000/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          docker logs atelier-devops-flask
          exit 1

      - name: Start Ngrok tunnel
        run: |
          docker run -d \
            --name atelier-devops-ngrok \
            --network host \
            -e NGROK_AUTHTOKEN="${{ secrets.NGROK_AUTHTOKEN }}" \
            ngrok/ngrok:latest \
            http 5000

      - name: Print public Ngrok URL
        run: |
          for attempt in {1..30}; do
            public_url="$(curl -fsS http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url // empty')"

            if [ -n "$public_url" ]; then
              echo "Public Ngrok URL: $public_url"
              echo "Exercise page: ${public_url}/exercices/"
              exit 0
            fi

            sleep 1
          done

          docker logs atelier-devops-ngrok
          exit 1

      - name: Keep tunnel open for demo
        run: sleep 120

      - name: Cleanup containers
        if: always()
        run: |
          docker rm -f atelier-devops-ngrok atelier-devops-flask 2>/dev/null || true
